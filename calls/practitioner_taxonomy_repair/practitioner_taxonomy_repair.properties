# ============================================================
# Practitioner Taxonomy Repair -- on-demand call type
# ============================================================
# NOT part of run_pipeline.ps1's CALL_TYPES list. Triggered manually
# after Practitioner_Taxonomy_Repair tool stages a batch in cpe_repair.
#
# Usage:
#   1. Run the repair tool to populate cpe_repair.* and get a batch_id
#   2. java -jar generic-hrp-ws-call.jar practitioner_taxonomy_repair --RUN_ID=<batch_id> --env-file=<env>
#
# The ${RUN_ID} placeholder semantically holds the cpe_repair batch_id;
# the loader does pure substitution and doesn't care.
# ============================================================

# Database connection and query
db.url=${DB_URL}
db.user=${DB_USER}
db.password=${DB_PASSWORD}
db.query=SELECT * FROM [cpe_repair].[fn_get_practitioner_taxonomy_repair_for_batch_id] (${RUN_ID})

# Web service credentials and behavior
ws.url=${WS_BASE_URL}/v4/Practitioner
ws.soap_action=http://healthedge.com/submit
ws.username=connector_admin
ws.password=${CONNECTOR_ADMIN_PASSWORD}
ws.log_only=${LOG_ONLY}
ws.print_call_on_success=true
ws.print_call_on_error=true
ws.thread_count=1
ws.retry.count=${WS_RETRY_COUNT}
ws.retry.http_codes=${WS_RETRY_HTTP_CODES}
ws.retry.backoff_ms=${WS_RETRY_BACKOFF_MS}
ws.retry.max_backoff_ms=${WS_RETRY_MAX_BACKOFF_MS}
ws.report.enabled=true
ws.report.file=practitioner_taxonomy_repair.report.json

# Request template -- taxonomy-only amend, hcc_id is the only identifier.
# NOTE: <maintenanceReasonCode> values below mirror the existing amend template
# (PractitionerCreateReason / 1). HRP-correct amend reason codes for a taxonomy
# overlay are a known TODO -- adjust here when those are confirmed.
request.template=<soapenv:Envelope xmlns:soapenv="http://schemas.xmlsoap.org/soap/envelope/" xmlns:prac="http://www.healthedge.com/connector/schema/practitioner" data-repeat-key="PRACTITIONER_HCC_ID"> \
   <soapenv:Header/> \
   <soapenv:Body> \
      <prac:practitioner resourceURI="1.0" version="1.0"> \
         <maintenanceReasonCode> \
            <codeSetName>PractitionerCreateReason</codeSetName> \
            <codeEntry>1</codeEntry> \
         </maintenanceReasonCode> \
         <maintenanceComment>Taxonomy overlay correction</maintenanceComment> \
         <practitioner> \
            <practitionerHccId>[PRACTITIONER_HCC_ID]</practitionerHccId> \
            <primarySpecialty data-optional="PRIMARY_TAXONOMY_NAME"> \
               <codeName>[PRIMARY_TAXONOMY_NAME]</codeName> \
            </primarySpecialty> \
            <secondarySpecialty data-optional="SECONDARY_TAXONOMY_NAME"> \
               <codeName>[SECONDARY_TAXONOMY_NAME]</codeName> \
            </secondarySpecialty> \
            <specialties data-optional="OTHER_TAXONOMY_NAME"> \
               <updateMode>REPLACE</updateMode> \
               <specialty data-repeat-key="OTHER_TAXONOMY_SEQ_NUM"> \
                  <codeName>[OTHER_TAXONOMY_NAME]</codeName> \
               </specialty> \
            </specialties> \
         </practitioner> \
      </prac:practitioner> \
   </soapenv:Body> \
</soapenv:Envelope>

# Response evaluation
response.status_xpath=/Envelope/Body/practitionerResponse/status
response.status_success_value=success

# Input source
input.source=db

# Post-call SQL
ws.postcall_sql.file=practitioner_taxonomy_repair.sql.json
ws.postcall_sql.execute_on_success=true
ws.postcall_sql.execute_on_error=true
