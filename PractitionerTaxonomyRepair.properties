# ============================================================
# Practitioner Taxonomy Repair - configuration
# ============================================================
# One-off remediation tool. Re-fetches NPPES for practitioners with
# NPPES-source taxonomies and stages corrected complete-overlay data
# into cpe_repair.* tables. The cpe_repair.repair_run.run_id printed
# at the end is then passed as --RUN_ID to generic-hrp-ws-call.jar
# with the practitioner_taxonomy_repair call folder.
#
# Note (since v1.4.0): production installs use install.ps1 +
# install.config to GENERATE this file -- not edit it by hand. This
# template is shipped only for source-build / dev usage where mvn
# copy-properties drops it next to the jar in target/.
# ============================================================

# --- Database connection ---
# Fill these in before first run. The placeholder values below are deliberate
# tokens, not real credentials -- the tool will fail to connect until you
# replace them with your actual SQL Server target.
db.url=jdbc:sqlserver://YOUR_DB_HOST:1433;databaseName=YOUR_DB_NAME;trustServerCertificate=true;
db.user=YOUR_DB_USER
db.password=YOUR_DB_PASSWORD

# --- NPI selection (optional) ---
# When --npi-file is NOT passed, the tool auto-derives the NPI list. The
# built-in default query is:
#
#   SELECT DISTINCT npi FROM <db.master.schema>.practitioner_taxonomy
#   WHERE taxonomy_source = 'NPPES'
#
# To scope tighter -- e.g. only practitioners loaded during the v1.4.0 bug
# window -- set db.npi_query to a custom SELECT that returns ONE column of
# NPIs. The query is used verbatim (no schema substitution), so qualify
# tables explicitly. It is ignored when --npi-file is passed (the file
# always wins). The db.user must have SELECT permission on every table the
# query references.
#
# Examples:
# db.npi_query=SELECT npi FROM cpe_master.practitioner_taxonomy WHERE npi IN ('1003008574','1234567890')
# db.npi_query=SELECT DISTINCT pt.npi FROM cpe_master.practitioner_taxonomy pt JOIN <cpe_load.* tables providing load_run linkage> lr ON ... WHERE pt.taxonomy_source='NPPES' AND lr.run_date BETWEEN '<bug-window-start>' AND '<bug-window-end>'
#db.npi_query=

# --- Schemas (typically defaults) ---
db.master.schema=cpe_master
db.repair.schema=cpe_repair

# --- Taxonomy lookup (optional overrides) ---
# Defaults match the daily pipeline's sp_resolve_taxonomy_names source:
#   [HRDW_REPLICA].[PAYOR_DW].[PROVIDER_TAXONOMY] (PROVIDER_TAXONOMY_CODE, PROVIDER_TAXONOMY_NAME)
# Override only if your environment uses a different replica DB / schema /
# column names. Same DB user (the one in db.user above) must have SELECT on
# whatever table you point at.
#db.taxonomy.lookup.table=[HRDW_REPLICA].[PAYOR_DW].[PROVIDER_TAXONOMY]
#db.taxonomy.lookup.code_column=PROVIDER_TAXONOMY_CODE
#db.taxonomy.lookup.name_column=PROVIDER_TAXONOMY_NAME
