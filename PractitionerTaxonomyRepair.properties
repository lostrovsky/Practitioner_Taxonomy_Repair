# ============================================================
# Practitioner Taxonomy Repair - configuration
# ============================================================
# One-off remediation tool. Re-fetches NPPES for practitioners with
# NPPES-source taxonomies and stages corrected complete-overlay data
# into cpe_repair.* tables. The cpe_repair.batch.batch_id printed at
# the end is then passed as --RUN_ID to generic-hrp-ws-call.jar with
# the practitioner_taxonomy_repair call folder.
# ============================================================

# --- Database connection ---
# Fill these in before first run. The placeholder values below are deliberate
# tokens, not real credentials -- the tool will fail to connect until you
# replace them with your actual SQL Server target.
db.url=jdbc:sqlserver://YOUR_DB_HOST:1433;databaseName=YOUR_DB_NAME;trustServerCertificate=true;
db.user=YOUR_DB_USER
db.password=YOUR_DB_PASSWORD

# --- Schemas (typically defaults) ---
db.master.schema=cpe_master
db.repair.schema=cpe_repair
db.xref.schema=cpe_xref
